<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IAMS – Student Matching</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <header class="site-header" id="site-header">
    <a class="brand" href="/dashboard.html">IAM<span>S</span></a>
  </header>
  <div class="page-body">
    <div class="container">
      <div id="page-loading" class="muted text-center mt-24">Loading…</div>
      <div id="page-content" style="display:none">
        <div class="flex-between mb-16">
          <h1>Student Matching</h1>
          <button class="btn btn-secondary" id="btnAutoMatch">
            <span class="spinner"></span><span class="btn-label">Auto-Match All</span>
          </button>
        </div>

        <div id="match-alert" class="alert hidden mb-16"></div>

        <div class="card mb-16" style="padding:20px">
          <h2 class="mb-16">Manual Assign</h2>
          <form id="assignForm" style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
            <div class="form-group" style="margin:0;flex:1;min-width:200px">
              <label>Student (unassigned)</label>
              <select id="sel-student" class="form-control"><option value="">Select student…</option></select>
            </div>
            <div class="form-group" style="margin:0;flex:1;min-width:200px">
              <label>Organisation</label>
              <select id="sel-org" class="form-control"><option value="">Select organisation…</option></select>
            </div>
            <div class="form-group" style="margin:0;flex:2;min-width:200px">
              <label>Override reason (optional)</label>
              <input type="text" id="inp-reason" class="form-control" placeholder="Explain if overriding suggestion…"/>
            </div>
            <div>
              <button type="submit" class="btn btn-primary" id="btnAssign">
                <span class="spinner"></span><span class="btn-label">Assign</span>
              </button>
            </div>
          </form>
        </div>

        <!-- Students table -->
        <div class="card">
          <div class="card-header flex-between">
            <h2>All Students</h2>
            <input type="text" id="match-search" class="form-control" placeholder="Search…" style="max-width:200px"/>
          </div>
          <table class="table mt-8">
            <thead>
              <tr>
                <th>Student</th>
                <th>Programme</th>
                <th>Status</th>
                <th>Assigned To</th>
                <th>Score</th>
                <th>Top Suggestion</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="match-tbody">
              <tr><td colspan="7" class="muted small text-center">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./_ui.js"></script>
  <script src="./matching.js"></script>
</body>
</html>
