<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IAMS – Sign In / Register</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <h1>IAMS</h1>
      <p>Industrial Attachment Management System</p>
    </div>

    <div class="card">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Sign In</div>
        <div class="auth-tab" data-tab="register">Register</div>
      </div>

      <!-- =================== LOGIN PANEL =================== -->
      <div class="auth-panel active" id="panel-login">
        <div id="login-alert" class="alert hidden"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="logEmail">Email address <span class="required">*</span></label>
            <input type="email" id="logEmail" placeholder="you@example.com"
                   required autocomplete="email"/>
            <span class="field-error" id="logEmail-err"></span>
          </div>

          <div class="form-group">
            <label for="logPass">Password <span class="required">*</span></label>
            <input type="password" id="logPass" placeholder="Your password"
                   required autocomplete="current-password"/>
            <span class="field-error" id="logPass-err"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="btnLogin">
            <span class="spinner"></span>
            <span class="btn-label">Sign In</span>
          </button>
        </form>

        <p class="text-center mt-16 small muted">
          No account yet? <a href="#" data-switch="register">Register here</a>
        </p>
      </div><!-- /login panel -->

      <!-- =================== REGISTER PANEL =================== -->
      <div class="auth-panel" id="panel-register">
        <div id="reg-alert" class="alert hidden"></div>

        <form id="regForm" novalidate>

          <!-- Role selector — shown first so fields below update immediately -->
          <div class="form-group">
            <label for="regRole">I am registering as <span class="required">*</span></label>
            <select id="regRole">
              <option value="student">Student</option>
              <option value="organization">Organisation</option>
            </select>
            <span class="field-hint" id="regRole-hint">Students submit logbooks &amp; reports. Organisations host interns.</span>
          </div>

          <!-- Common fields -->
          <div class="form-group" id="wrap-regName">
            <label for="regName" id="label-regName">Full name <span class="required">*</span></label>
            <input type="text" id="regName" placeholder="Your full name" required/>
            <span class="field-error" id="regName-err"></span>
          </div>

          <!-- Student-only fields -->
          <div id="fields-student">
            <div class="form-row">
              <div class="form-group">
                <label for="regStudentNum">Student number <span class="required">*</span></label>
                <input type="text" id="regStudentNum" placeholder="e.g. 21234567"/>
                <span class="field-error" id="regStudentNum-err"></span>
              </div>
              <div class="form-group">
                <label for="regProgram">Programme / Course <span class="required">*</span></label>
                <input type="text" id="regProgram" placeholder="e.g. BSc Computer Science"/>
                <span class="field-error" id="regProgram-err"></span>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="regYear">Year of study <span class="required">*</span></label>
                <select id="regYear">
                  <option value="">Select year</option>
                  <option value="1">Year 1</option>
                  <option value="2">Year 2</option>
                  <option value="3">Year 3</option>
                  <option value="4">Year 4</option>
                </select>
                <span class="field-error" id="regYear-err"></span>
              </div>
              <div class="form-group">
                <label for="regLocation">Preferred location</label>
                <input type="text" id="regLocation" placeholder="e.g. Gaborone"/>
              </div>
            </div>
          </div>

          <!-- Organisation-only fields -->
          <div id="fields-org" style="display:none;">
            <div class="form-row">
              <div class="form-group">
                <label for="regOrgName">Company / Organisation name <span class="required">*</span></label>
                <input type="text" id="regOrgName" placeholder="e.g. Tech Solutions Ltd"/>
                <span class="field-error" id="regOrgName-err"></span>
              </div>
              <div class="form-group">
                <label for="regIndustry">Industry <span class="required">*</span></label>
                <select id="regIndustry">
                  <option value="">Select industry</option>
                  <option>Information Technology</option>
                  <option>Finance &amp; Banking</option>
                  <option>Healthcare</option>
                  <option>Engineering</option>
                  <option>Education</option>
                  <option>Manufacturing</option>
                  <option>Government</option>
                  <option>Retail &amp; Commerce</option>
                  <option>Other</option>
                </select>
                <span class="field-error" id="regIndustry-err"></span>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="regContact">Contact person <span class="required">*</span></label>
                <input type="text" id="regContact" placeholder="Full name of contact"/>
                <span class="field-error" id="regContact-err"></span>
              </div>
              <div class="form-group">
                <label for="regOrgLocation">City / Location <span class="required">*</span></label>
                <input type="text" id="regOrgLocation" placeholder="e.g. Gaborone"/>
                <span class="field-error" id="regOrgLocation-err"></span>
              </div>
            </div>
            <div class="form-group">
              <label for="regSlots">Intern slots available</label>
              <input type="number" id="regSlots" placeholder="e.g. 3" min="0" max="50"/>
            </div>
          </div>

          <!-- Email + Password (always shown) -->
          <div class="form-group">
            <label for="regEmail">Email address <span class="required">*</span></label>
            <input type="email" id="regEmail" placeholder="you@example.com"
                   required autocomplete="email"/>
            <span class="field-error" id="regEmail-err"></span>
          </div>

          <div class="form-group">
            <label for="regPass">Password <span class="required">*</span></label>
            <input type="password" id="regPass" placeholder="Min 6 characters"
                   required minlength="6" autocomplete="new-password"/>
            <span class="field-error" id="regPass-err"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="btnReg">
            <span class="spinner"></span>
            <span class="btn-label">Create Account</span>
          </button>
        </form>

        <p class="text-center mt-16 small muted">
          Already registered? <a href="#" data-switch="login">Sign in</a>
        </p>
      </div><!-- /register panel -->

    </div><!-- /card -->
  </div><!-- /auth-box -->
</div>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./_ui.js"></script>
<script src="./auth.js"></script>
</body>
</html>
