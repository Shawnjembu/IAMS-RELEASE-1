<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IAMS – My Logbook</title>
  <link rel="stylesheet" href="./styles.css"/>
  <style>
    .week-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin-top:8px; }
    @media(max-width:600px){ .week-grid{ grid-template-columns:repeat(4,1fr); } }
    .week-cell { text-align:center; padding:8px 4px; border-radius:var(--radius-sm);
                 border:1.5px solid var(--border); background:var(--bg-input);
                 font-size:.85rem; font-weight:600; }
    .week-cell.done  { border-color:var(--success); background:var(--success-bg); color:var(--success); }
    .week-cell.done::after { content:" ✓"; }
    .logbook-row { display:flex; flex-direction:column; gap:4px; padding:14px 16px;
                   border-bottom:1px solid var(--border); }
    .logbook-row:last-child { border-bottom:none; }
    .logbook-row-header { display:flex; justify-content:space-between; align-items:center; }
    select.form-control { background:var(--bg-input); color:var(--text); border:1px solid var(--border);
                          border-radius:var(--radius-sm); padding:10px 12px; width:100%;
                          font-family:inherit; font-size:.9rem; }
    select.form-control:focus { border-color:var(--border-focus); outline:none; }
  </style>
</head>
<body>
  <header class="site-header" id="site-header">
    <a class="brand" href="/dashboard.html">IAM<span>S</span></a>
  </header>
  <div class="page-body">
    <div class="container">
      <div id="page-loading" class="muted text-center mt-24">Loading…</div>
      <div id="page-content" style="display:none">

        <div class="flex-between mb-16">
          <h1>My Logbook</h1>
          <a href="/dashboard.html" class="btn btn-secondary btn-sm">← Dashboard</a>
        </div>

        <!-- Week progress grid -->
        <div class="card mb-16" style="padding:20px">
          <h2 class="mb-8">Weekly Progress</h2>
          <p class="small muted mb-8">Submitted weeks are highlighted in green. Submit all 12 weeks to complete your logbook requirement.</p>
          <div class="week-grid" id="week-progress-grid">
            <!-- 12 cells, populated by JS -->
          </div>
        </div>

        <!-- New entry form -->
        <div class="card mb-16" style="padding:24px">
          <h2 class="mb-16">New Entry</h2>
          <div id="logbook-alert" class="alert hidden mb-8"></div>
          <form id="logbookForm">

            <div class="form-group">
              <label for="lb-week">Week <span class="required">*</span></label>
              <select id="lb-week" class="form-control">
                <option value="">Select week…</option>
                <option value="1">Week 1</option>
                <option value="2">Week 2</option>
                <option value="3">Week 3</option>
                <option value="4">Week 4</option>
                <option value="5">Week 5</option>
                <option value="6">Week 6</option>
                <option value="7">Week 7</option>
                <option value="8">Week 8</option>
                <option value="9">Week 9</option>
                <option value="10">Week 10</option>
                <option value="11">Week 11</option>
                <option value="12">Week 12</option>
              </select>
              <span class="field-error" id="lb-week-err"></span>
            </div>

            <div class="form-group">
              <label>Activities this week <span class="required">*</span></label>
              <textarea id="lb-activities" rows="4" placeholder="Describe what you did this week…"
                style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px;font-family:inherit;resize:vertical"></textarea>
              <span class="field-error" id="lb-activities-err"></span>
            </div>

            <div class="form-group">
              <label>Learning outcomes</label>
              <textarea id="lb-outcomes" rows="3" placeholder="What did you learn?"
                style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px;font-family:inherit;resize:vertical"></textarea>
            </div>

            <div class="form-group">
              <label>Challenges faced</label>
              <textarea id="lb-challenges" rows="3" placeholder="Any difficulties this week?"
                style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px;font-family:inherit;resize:vertical"></textarea>
            </div>

            <div class="form-group">
              <label>Attachment <span class="small muted">(PDF or DOCX only, max 10 MB — optional)</span></label>
              <input type="file" id="lb-file" accept=".pdf,.docx"/>
              <span class="small muted" id="lb-file-status" style="display:block;margin-top:4px"></span>
              <span class="field-error" id="lb-file-err"></span>
            </div>

            <div class="row">
              <button type="submit" class="btn btn-primary" id="btnLogbook">
                <span class="spinner"></span>
                <span class="btn-label">Submit Entry</span>
              </button>
              <a href="/dashboard.html" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>

        <!-- Past entries -->
        <div class="card">
          <div class="card-header">
            <h2>Past Entries</h2>
          </div>
          <div id="logbook-entries"><p class="muted small" style="padding:16px">No entries yet.</p></div>
        </div>

      </div>
    </div>
  </div>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./_ui.js"></script>
  <script src="./logbook.js"></script>
</body>
</html>
