<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IAMS – My Students</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <header class="site-header" id="site-header">
    <a class="brand" href="/dashboard.html">IAM<span>S</span></a>
  </header>
  <div class="page-body">
    <div class="container">
      <div id="page-loading" class="muted text-center mt-24">Loading…</div>
      <div id="page-content" style="display:none">
        <div class="flex-between mb-16">
          <h1>My Students</h1>
          <span id="student-count" class="badge-role coordinator"></span>
        </div>

        <!-- No students -->
        <div id="no-students" style="display:none" class="card text-center" style="padding:48px 24px">
          <div style="font-size:3rem;margin-bottom:12px;">🎓</div>
          <h2>No students yet</h2>
          <p class="muted">No students have been assigned to your organisation yet. The coordinator will assign interns once matching is complete.</p>
          <a href="/dashboard.html" class="btn btn-secondary mt-16">Back to Dashboard</a>
        </div>

        <!-- Student list -->
        <div id="students-list" style="display:none">
          <div class="card">
            <div class="card-header"><h2>Assigned Interns</h2></div>
            <table class="table mt-8" id="students-table">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Assigned</th>
                  <th>Industrial Supervisor</th>
                  <th>Logbook entries</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="students-tbody">
                <tr><td colspan="5" class="muted small text-center">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./_ui.js"></script>
  <script src="./students.js"></script>
</body>
</html>
